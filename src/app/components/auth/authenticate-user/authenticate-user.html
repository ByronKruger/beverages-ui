<div nz-flex style="background-color: lightsalmon1;">
    <div style="flex: 1">
        
    </div>
    <div style="flex: 2">
        <nz-card style="margin-top: 16px">
            <div style="height: 400px; max-height: 400px" nz-flex [nzVertical]="true" nzJustify="space-between">
            <!-- <div nz-flex> -->
                <!-- <div style="flex: 1"></div> -->
                <div nz-flex [nzVertical]="true">
                    <div nz-flex nzJustify="center">
                        <h2>Sign in With Your Email</h2>
                    </div>

                    <nz-form [formGroup]="loginForm" nz-flex [nzVertical]="true">
                        <!-- <div class="username-password-container" nz-flex [nzVertical]="true" nzAlign="center"> -->
                            <nz-form-item style="background-color: blueviolet1;">
                                <!-- <nz-form-label [nzSpan]="8" [nzLabelAlign]="'right'" nzFor="username" style="background-color: red1">
                                    Email
                                </nz-form-label> -->
                                <nz-form-control style="background-color: blue1">
                                    <!-- <input nz-input name="username" id="email"/> -->
                                    <nz-input-wrapper>
                                        <nz-icon nzInputPrefix nzType="user" />
                                        <input nz-input placeholder="Email" nzSize="large" formControlName="email" name="email"/>
                                    </nz-input-wrapper>
                                </nz-form-control>
                            </nz-form-item>
                            <nz-form-item style="background-color: aqua1;">
                                <!-- <nz-form-label [nzSpan]="8" [nzLabelAlign]="'right'" nzFor="password" style="background-color: red1">
                                    Password
                                </nz-form-label> -->
                                <nz-form-control style="background-color: blue1">
                                    <!-- <input nz-input name="password" id="password"/> -->
                                    <nz-input-wrapper>
                                        <nz-icon nzInputPrefix nzType="password" />
                                        <input nz-input placeholder="Password" nzSize="large" name="password" formControlName="password"/>
                                    </nz-input-wrapper>
                                </nz-form-control>
                            </nz-form-item>
                            <div nz-flex nzJustify="center">
                                <button style="width: 200px" nz-button nzType="primary" (click)="onAuth()">Login</button>
                            </div>
                        <!-- </div> -->
                    </nz-form>
                </div>
                <!-- <div style="flex: 1"></div> -->
                <!-- <form nz-form [nzLayout]="'horizontal'" [formGroup]="loginForm">
                    <nz-form-item>
                        <nz-form-label [nzSpan]="6" [nzXs]="12" [nzLabelAlign]="'left'" nzFor="username">
                        Full Name
                        </nz-form-label>
                        <nz-form-control [nzSpan]="18" [nzXs]="24">
                        <input nz-input id="username" formControlName="username" />
                        </nz-form-control>
                    </nz-form-item>

                    <nz-form-item>

                        <input nz-input id="password" formControlName="password" />
                        </nz-form-control>
                    </nz-form-item>
                </form> -->
                <!-- </div> -->
                <div nz-flex [nzVertical]="true">
                    <nz-divider nzPlain nzText="Or login with your social account" nzSize="large"></nz-divider>
                    <div class="external-auth-container" nz-flex [nzVertical]="true" nzAlign="center">
                        <app-oauth-buttons></app-oauth-buttons>
                        <!-- <button nz-button nzType="text">Continue with Google</button> -->
                        <!-- <button nz-button nzType="text">Continue with Facebook</button> -->
                    </div>
                </div>
            </div>
        </nz-card>
    </div>
    <div style="flex: 1">
        
    </div>
</div>
