<div class="oauth-container">
    <!-- Google -->
    <button
    type="button"
    class="google-btn"
    (click)="onGoogleClick()"
    aria-label="Sign in with Google">
    <!-- Official multicoloured Google G (from Google branding assets) -->
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84c-.21 1.1-.84 2.04-1.8 2.66v2.32h2.9c1.7-1.56 2.7-3.87 2.7-6.62z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.16l-2.9-2.32c-.8.54-1.82.86-3.06.86-2.35 0-4.35-1.59-5.06-3.72H.9v2.34C2.36 15.9 5.4 18 9 18z"/>
            <path fill="#FBBC05" d="M4.94 10.72c-.18-.54-.28-1.11-.28-1.72s.1-1.18.28-1.72V5.34H.9C.32 6.5 0 7.72 0 9s.32 2.5.9 3.66l3.04-2.34z"/>
            <path fill="#EA4335" d="M9 4.28c1.34 0 2.55.46 3.5 1.36l2.62-2.62C13.47 1.58 11.4 0 9 0 5.4 0 2.36 2.1.9 5.34l3.04 2.34C4.59 5.87 6.59 4.28 9 4.28z"/>
        </svg>
        <span>Sign in with Google</span>
    </button>

    <!-- Facebook -->
    <button
    type="button"
    class="facebook-btn"
    (click)="onFacebookClick()"
    aria-label="Continue with Facebook">
    <!-- Official Facebook "f" (current branding) -->
        <svg width="20" height="20" fill="currentColor" viewBox="0 0 1792 1792" xmlns="http://www.w3.org/2000/svg">
            <path d="M1343 12v264h-157q-86 0-116 36t-30 108v189h293l-39 296h-254v759h-306v-759h-255v-296h255v-218q0-186 104-288.5t277-102.5q147 0 228 12z"/>
        </svg>
        <span>Continue with Facebook</span>
    </button>
</div>
